<!-- TABELAS-->
<!-- O border="4" é para o tamanho da borda das TABELAS-->
<!-- O cellpadding="10" é o espaçamento das linhas das TABELAS-->
<!-- O bordercolor="black" é a cor das bordas das TABELAS-->

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
    content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>

<body>

    <table border="4" 
    cellpadding="10" 
    bordercolor="black">
        <tr>
            <th> Tiago</th> <!-- th é as COLUNAS-->
            <th> Valor</th>
            <th> Data</th>
        </tr>

        <tr>
            <td> Alimentação</td> <!-- tD é as linhas-->
            <td> R$ 30,00</td>
            <td> 07/03/2026</td>
        </tr>

        <tr>
            <td> Diversão</td> <!-- tD é as linhas-->
            <td> R$ 48,00</td>
            <td> 08/03/2026</td>
        </tr>

        <tr>
            <td> Transporte</td> <!-- tD é as linhas-->
            <td> R$ 13,00</td>
            <td> 09/03/2026</td>
        </tr>

    </table>

</body>

</html>
